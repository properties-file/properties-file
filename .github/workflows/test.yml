name: Test

on:
  push:
    branches: ['main']
    tags: ['v*']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, latest]
    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v5

      # Setup
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # Test
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Test
        run: npm run build

  compat:
    name: Node.js 0.4.0 compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Node 20 is only used to compile TypeScript → CJS.
      # The actual test runs inside a Docker container with Node 0.4.0
      # compiled from source (the first stable release with ES5 support).
      - name: Setup node (for compilation only)
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compile TypeScript to CJS
        run: rm -Rf ./dist && tsc && npx tsx src/build-scripts/build.ts

      - name: Run tests on Node.js 0.4.0 (compiled from source via Docker)
        run: docker build --platform linux/amd64 -f tests/node-compat/Dockerfile.node-0.4 .
